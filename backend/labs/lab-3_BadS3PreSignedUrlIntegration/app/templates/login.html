
<!-- index.html -->
{% extends "base.html" %}

{% block styles %}
  <link rel = "stylesheet" type = "text/css" href = "{{ url_for('static', filename='styles/login.css') }}">
{% endblock %}

{% block content %}
        <div class="login-container">
            <h1 class="login-title">Log in to your account</h1>
            <form method="POST" action="/login">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input name="username" type="username" id="email" placeholder="Username" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input name="password" type="password" id="password" required>
                </div>
                <button type="submit" class="login-button">Login</button>
               
            </form>
            <a href="/" class="back-to-store">Back to store</a>
        </div>
{% endblock %}

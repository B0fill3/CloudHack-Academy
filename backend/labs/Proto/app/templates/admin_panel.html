{% extends "base.html" %}


{% block styles %}
<!-- Carga la hoja de estilos específica para esta página -->
<link rel="stylesheet" href="{{ url_for('static', filename='styles/admin_panel.css') }}">
{% endblock %}

{% block content %}
<div class="admin-container">
    <h1>Admin Panel: Users</h1>
    <table class="admin-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Username</th>
                <th>Email</th>
                <th>Admin</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for user in users %}
            <tr>
                <td>{{ user.id }}</td>
                <td>{{ user.username }}</td>
                <td>{{ user.email }}</td>
                <td>{{ 'Yes' if user.admin else 'No' }}</td>
                <td>
                    <!-- Formulario que hace POST a la ruta que elimina el usuario -->
                    <form action="{{ url_for('delete_user', user_id=user.id) }}" method="POST" style="display:inline-block;">
                        <button type="submit" class="delete-btn">Delete</button>
                    </form>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}

AWSTemplateFormatVersion: '2010-09-09'
Description: |
  Laboratorio de escalada de privilegios mediante iam:PassRole.

Parameters:
  AccountId:
    Type: String
    Default: '123456789012'
    Description: ID de la cuenta AWS donde se despliega el lab

Resources:
  ## ────────────────────────────────────────────────────────── ##
  ## Grupo de desarrolladores                                  ##
  ## ────────────────────────────────────────────────────────── ##
  DevsGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: devs

  ## ────────────────────────────────────────────────────────── ##
  ## Usuario IAM “david”                                       ##
  ## ────────────────────────────────────────────────────────── ##
  DavidUser:
    Type: AWS::IAM::User
    Properties:
      UserName: david

  ## Access Key para david (saldrá en Outputs)
  DavidAccessKey:
    Type: AWS::IAM::AccessKey
    Properties:
      UserName: !Ref DavidUser
      Status: Active

  ## Añadir david al grupo devs
  AddDavidToDevs:
    Type: AWS::IAM::UserToGroupAddition
    Properties:
      GroupName: !Ref DevsGroup
      Users:
        - !Ref DavidUser

  ## ────────────────────────────────────────────────────────── ##
  ## Rol “dev-admin-role” (peligroso)                           ##
  ## ────────────────────────────────────────────────────────── ##
  DevAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: dev-test-functions-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess

  ## Rol “dev-logger-role” (inofensivo)
  DevLoggerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: dev-logger-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchLogsFullAccess

  ## ────────────────────────────────────────────────────────── ##
  ## Política del grupo devs: RunInstances + PassRole genérico ##
  ## ────────────────────────────────────────────────────────── ##
  DevsGroupPassRolePolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: DevsRunEc2AndPassDevRoles
      Groups:
        - !Ref DevsGroup
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowEC2
            Effect: Allow
            Action:
              - ec2:*
            Resource: '*'
          - Sid: AllowEC2PassRole
            Effect: Allow
            Action:
              - iam:PassRole
            Resource: '*'
            Condition:
              StringLike:
                iam:PassedToService: ec2.amazonaws.com
          - Sid: AllowInstanceProfileManagement
            Effect: Allow
            Action:
              - iam:CreateInstanceProfile
              - iam:AddRoleToInstanceProfile
              - iam:ListInstanceProfiles
              - iam:GetInstanceProfile
            Resource: "*"

  ## ────────────────────────────────────────────────────────── ##
  ## Política sólo-lectura IAM para david (listar todo)        ##
  ## ────────────────────────────────────────────────────────── ##
  DavidViewIAMPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: DavidViewIAM
      Users:
        - !Ref DavidUser
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - iam:List*
              - iam:Get*
              - sts:GetCallerIdentity
            Resource: '*'

  ## ────────────────────────────────────────────────────────── ##
  ## Bucket S3 de soporte                                      ##
  ## ────────────────────────────────────────────────────────── ##
  StoreFilesBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub storefiles-${AWS::AccountId}-passrolelab
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

Outputs:
  DavidAccessKeyId:
    Description: Access Key ID para david
    Value: !Ref DavidAccessKey

  DavidSecretAccessKey:
    Description: Secret Access Key para david
    Value: !GetAtt DavidAccessKey.SecretAccessKey

  StoreFilesBucketName:
    Description: Nombre del bucket S3 de soporte
    Value: !Ref StoreFilesBucket